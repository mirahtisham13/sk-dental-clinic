<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews | Admin | SK Dental</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--border);
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--success);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    
    <aside class="sidebar">
        <a href="../index.html" class="logo" target="_blank">
            <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><path d="M16 4C13.5 4 11.5 6 10 9C8.5 12 7.5 15.5 8.5 19.5C9.5 23 11 26 13 28C14 29 15 29.5 16 29.5C17 29.5 18 29 19 28C21 26 22.5 23 23.5 19.5C24.5 15.5 23.5 12 22 9C20.5 6 18.5 4 16 4Z" stroke="var(--primary)" stroke-width="2"/></svg>
            SK Dental
        </a>
        <nav>
            <a href="cases.html">All Cases</a>
            <a href="case-form.html">Add Case</a>
            <a href="reviews.html" class="active">Reviews</a>
            <a href="hub.html">Site Editor</a>
        </nav>
        <button id="logoutBtn" class="logout-btn" style="margin-top: auto;">Log Out</button>
    </aside>

    <main class="main-content">
        <div class="header-flex">
            <h1>Patient Reviews</h1>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Rating</th>
                        <th>Review</th>
                        <th>Source</th>
                        <th>Published</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reviewsTableBody">
                    <tr><td colspan="7">Loading reviews...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.getElementById('reviewsTableBody');

            async function loadReviews() {
                const { data, error } = await supabaseClient
                    .from('testimonials')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    tableBody.innerHTML = `<tr><td colspan="7" style="color:red">Error: ${error.message}</td></tr>`;
                    return;
                }

                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7">No reviews found.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = data.map(r => `
                    <tr>
                        <td>${new Date(r.created_at).toLocaleDateString()}</td>
                        <td><strong>${r.name}</strong></td>
                        <td>${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</td>
                        <td style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${r.text}</td>
                        <td style="text-transform: capitalize;">${r.source || 'Direct'}</td>
                        <td>
                            <label class="switch">
                                <input type="checkbox" onchange="togglePublish('${r.id}', this.checked)" ${r.is_published ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                        </td>
                        <td>
                            <button class="action-btn delete" onclick="deleteReview('${r.id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            }

            window.togglePublish = async (id, isPublished) => {
                const { error } = await supabaseClient
                    .from('testimonials')
                    .update({ is_published: isPublished })
                    .eq('id', id);
                if(error) {
                    alert('Error updating status: ' + error.message);
                    loadReviews(); // reload to reset toggle
                }
            };

            window.deleteReview = async (id) => {
                if(confirm('Are you sure you want to delete this review?')) {
                    const { error } = await supabaseClient.from('testimonials').delete().eq('id', id);
                    if(error) alert('Error deleting: ' + error.message);
                    else loadReviews();
                }
            };

            loadReviews();
        });
    </script>
</body>
</html>
