<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Cases | Admin | SK Dental</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <aside class="sidebar">
        <a href="../index.html" class="logo" target="_blank">
            <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><path d="M16 4C13.5 4 11.5 6 10 9C8.5 12 7.5 15.5 8.5 19.5C9.5 23 11 26 13 28C14 29 15 29.5 16 29.5C17 29.5 18 29 19 28C21 26 22.5 23 23.5 19.5C24.5 15.5 23.5 12 22 9C20.5 6 18.5 4 16 4Z" stroke="var(--primary)" stroke-width="2"/></svg>
            SK Dental
        </a>
        <nav>
            <a href="cases.html" class="active">All Cases</a>
            <a href="case-form.html">Add Case</a>
            <a href="reviews.html">Reviews</a>
            <a href="hub.html">Site Editor</a>
        </nav>
        <button id="logoutBtn" class="logout-btn" style="margin-top: auto;">Log Out</button>
    </aside>

    <main class="main-content">
        <div class="header-flex">
            <h1>All Cases</h1>
            <a href="case-form.html" class="btn">Add New Case</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="casesTableBody">
                    <tr><td colspan="4">Loading cases...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.getElementById('casesTableBody');

            async function loadCases() {
                const { data, error } = await supabaseClient
                    .from('cases')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="color:red">Error: ${error.message}</td></tr>`;
                    return;
                }

                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4">No cases found.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = data.map(c => `
                    <tr>
                        <td>${new Date(c.created_at).toLocaleDateString()}</td>
                        <td><strong>${c.title}</strong></td>
                        <td>${c.category}</td>
                        <td>
                            <a href="case-form.html?id=${c.id}" class="action-btn">Edit</a>
                            <button class="action-btn delete" onclick="deleteCase('${c.id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            }

            window.deleteCase = async (id) => {
                if(confirm('Are you sure you want to delete this case?')) {
                    const { error } = await supabaseClient.from('cases').delete().eq('id', id);
                    if(error) alert('Error deleting: ' + error.message);
                    else loadCases();
                }
            };

            // Call load only after auth is ready (handled by auth.js usually, but we can just run it)
            loadCases();
        });
    </script>
</body>
</html>
